AWSTemplateFormatVersion: '2010-09-09'
Description: Marmil Frontend Infrastructure (S3 + CloudFront + Route53)

Parameters:

  DomainName:
    Type: String
    Default: marmil.co

  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID

  CertificateArn:
    Type: String
    Description: ACM Certificate ARN in us-east-1

  Environment:
    Type: String
    Default: development
    AllowedValues:
      - development
      - production

Resources:

#########################################################
# S3 Bucket
#########################################################

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'marmil-frontend-${Environment}'

      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false

      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket

      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicRead
            Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource:
              - !Sub '${FrontendBucket.Arn}/*'

#########################################################
# CloudFront
#########################################################

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:

        Enabled: true

        Aliases:
          - !Ref DomainName
          - !Sub 'www.${DomainName}'

        DefaultRootObject: index.html

        Origins:
          - Id: FrontendOrigin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            S3OriginConfig: {}

        DefaultCacheBehavior:
          TargetOriginId: FrontendOrigin
          ViewerProtocolPolicy: redirect-to-https

          AllowedMethods:
            - GET
            - HEAD

          CachedMethods:
            - GET
            - HEAD

          Compress: true

          ForwardedValues:
            QueryString: false

            Cookies:
              Forward: none

        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html

          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

#########################################################
# Route53 Root Domain
#########################################################

  RootRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId

      Name: !Ref DomainName

      Type: A

      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

#########################################################
# Route53 WWW
#########################################################

  WWWRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId

      Name: !Sub 'www.${DomainName}'

      Type: A

      AliasTarget:
        DNSName: !GetAtt FrontendDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

#########################################################
# Outputs
#########################################################

Outputs:

  BucketName:
    Value: !Ref FrontendBucket

  CloudFrontDistributionId:
    Value: !Ref FrontendDistribution

  CloudFrontDomain:
    Value: !GetAtt FrontendDistribution.DomainName

  WebsiteURL:
    Value: !Sub 'https://${DomainName}'