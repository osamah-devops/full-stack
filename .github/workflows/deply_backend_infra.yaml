name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'frontend_infrastructure/**'
      - '.github/workflows/deploy_frontend.yaml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
          aws-region: us-east-1

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file frontend_infrastructure/deployment.yaml \
            --stack-name frontend-infrastructure \
            --parameter-overrides \
              Environment=development \
              DomainName=marmil.co \
              HostedZoneId=YOUR_ROUTE53_HOSTED_ZONE_ID \
              CertificateArn=arn:aws:acm:us-east-1:072754096540:certificate/4b5e7d68-8d5e-49e2-a57f-0a1045800819

      - name: Build frontend
        run: |
            cd frontend
            npm install
            npm run build

      - name: Sync to S3
        run: |
          aws s3 sync frontend/dist/ s3://marmil-frontend-development/ --delete
      - name: Invalidate CloudFront Cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name frontend-infrastructure \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          
          aws cloudfront create-invalidation \
            --distribution-id $DISTRIBUTION_ID \
            --paths "/*"