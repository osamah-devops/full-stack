name: Deploy Backend Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'backend-infra/**'
      - 'backend/**'
      - '.github/workflows/deply_backend_infra.yaml'
env:
  AWS_REGION: us-east-1
  STACK_NAME: backend-infrastructure
  ECR_REPOSITORY: marmil/backend

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      #################################################
      # Checkout
      #################################################
      - name: Checkout code
        uses: actions/checkout@v4

      #################################################
      # AWS Auth (OIDC)
      #################################################
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
            audience: sts.amazonaws.com
            role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
            aws-region: ${{ env.AWS_REGION }}

      #################################################
      # Login to ECR
      #################################################
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      #################################################
      # Build + Push Docker Image
      #################################################
      - name: Build Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG ./backend
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push Docker image to ECR
        run: |
          IMAGE_TAG=${GITHUB_SHA}
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      #################################################
      # Deploy CloudFormation
      #################################################
      - name: Deploy CloudFormation stack
        working-directory: ./backend_infrastructure
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:${GITHUB_SHA}

          aws cloudformation deploy \
            --template-file deployment.yaml \
            --stack-name $STACK_NAME \
            --capabilities CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              Environment=production \
              ECRRepoURL=$IMAGE_URI \
              CertificateArn=arn:aws:acm:us-east-1:072754096540:certificate/162cfbd9-c998-46fd-a66e-bff328af88f0

      #################################################
      # Wait for stability (important for ECS)
      #################################################
      - name: Wait for ECS stability
        run: |
          aws ecs wait services-stable \
            --cluster backend-infrastructure-cluster \
            --services backend-infrastructure-service

      #################################################
      # Confirm stack success
      #################################################
      - name: Verify CloudFormation stack
        run: |
          aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --query "Stacks[0].StackStatus" \
            --output text