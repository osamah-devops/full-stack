name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'frontend-infrastructure/**'
      - '.github/workflows/deploy_frontend.yaml'

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  STACK_NAME: frontend-infrastructure
  HOSTED_ZONE_ID: Z06560653HHLUZYIU86O4

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::072754096540:role/aws-serverless-api
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy CloudFormation
        run: |
          aws cloudformation deploy \
            --template-file frontend_infrastructure/deployment.yaml \
            --stack-name ${{ env.STACK_NAME }} \
            --parameter-overrides \
              Environment=development \
              DomainName=marmil.co \
              HostedZoneId=${{ env.HOSTED_ZONE_ID }} \
              CertificateArn=arn:aws:acm:us-east-1:072754096540:certificate/4b5e7d68-8d5e-49e2-a57f-0a1045800819

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/build/ s3://marmil-frontend-development/ --delete
      - name: Invalidate CloudFront cache
        run: |
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionId'].OutputValue" --output text)
          aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"
      - name: Output CloudFront URL
        run: |
          DISTRIBUTION_DOMAIN=$(aws cloudformation describe-stacks --stack-name ${{ env.STACK_NAME }} --query "Stacks[0].Outputs[?OutputKey=='FrontendDistributionDomain'].OutputValue" --output text)
          echo "CloudFront URL: https://$DISTRIBUTION_DOMAIN"